name: AirKey — Build Debug APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Auto-detect where settings.gradle is ─────────────────────────────
      - name: Detect Android project root
        id: detect
        run: |
          if [ -f "wifi-qr-app/settings.gradle" ]; then
            echo "PROJECT_DIR=wifi-qr-app" >> $GITHUB_OUTPUT
            echo "✅ Project found at: wifi-qr-app/"
          elif [ -f "settings.gradle" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_OUTPUT
            echo "✅ Project found at root"
          else
            echo "❌ Cannot find settings.gradle — searching..."
            FOUND=$(find . -name "settings.gradle" -maxdepth 4 | head -1)
            if [ -n "$FOUND" ]; then
              DIR=$(dirname "$FOUND")
              echo "PROJECT_DIR=$DIR" >> $GITHUB_OUTPUT
              echo "✅ Found at: $DIR"
            else
              echo "::error::No Android project found. Ensure settings.gradle exists."
              exit 1
            fi
          fi

      # ─── 3. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 4. Android SDK ──────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 5. Gradle 8.4 ───────────────────────────────────────────────────────
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-read-only: false

      # ─── 6. Gradle Wrapper JAR (binary not committed to repo) ────────────────
      - name: Download Gradle Wrapper JAR
        run: |
          DIR="${{ steps.detect.outputs.PROJECT_DIR }}"
          mkdir -p "$DIR/gradle/wrapper"
          curl -fsSL -o "$DIR/gradle/wrapper/gradle-wrapper.jar" \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x "$DIR/gradlew"
          echo "✅ Wrapper JAR ready"

      # ─── 7. Cache ────────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ─── 8. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          DIR="${{ steps.detect.outputs.PROJECT_DIR }}"
          cd "$DIR"
          gradle assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dkotlin.incremental=false"

      # ─── 9. Verify APK ───────────────────────────────────────────────────────
      - name: Verify APK output
        id: apk_info
        run: |
          DIR="${{ steps.detect.outputs.PROJECT_DIR }}"
          APK="$DIR/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            SIZE=$(ls -lh "$APK" | awk '{print $5}')
            echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
            echo "APK_SIZE=$SIZE" >> $GITHUB_OUTPUT
            echo "✅ APK built: $APK ($SIZE)"
          else
            echo "::error::APK not found at expected path"
            find "$DIR" -name "*.apk" 2>/dev/null
            exit 1
          fi

      # ─── 10. Upload APK ──────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AirKey-Debug-APK-${{ github.run_number }}
          path: ${{ steps.apk_info.outputs.APK_PATH }}
          retention-days: 30
          if-no-files-found: error

      # ─── 11. Job Summary ──────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 📱 AirKey Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Size** | ${{ steps.apk_info.outputs.APK_SIZE || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run #** | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ **Download APK** from the Artifacts section at the top of this page." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on device" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'adb install app-debug.apk' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
