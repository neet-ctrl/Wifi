name: "🐛 AirKey — Build Debug APK"

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

jobs:
  build:
    name: "Build Debug APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────────────────
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 2. Detect project root ───────────────────────────────────────────────
      - name: "🔍 Detect Android project root"
        id: detect
        run: |
          if [ -f "settings.gradle" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_OUTPUT
            echo "Found project at: root"
          elif [ -f "wifi-qr-app/settings.gradle" ]; then
            echo "PROJECT_DIR=wifi-qr-app" >> $GITHUB_OUTPUT
            echo "Found project at: wifi-qr-app/"
          else
            echo "ERROR: Cannot find settings.gradle"
            find . -name "settings.gradle" -maxdepth 4
            exit 1
          fi

      # ─── 3. JDK 17 ───────────────────────────────────────────────────────────
      - name: "☕ Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ─── 4. Android SDK ──────────────────────────────────────────────────────
      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v3

      # ─── 5. Gradle wrapper JAR ────────────────────────────────────────────────
      - name: "🔧 Download Gradle Wrapper JAR"
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          mkdir -p "$PROJECT/gradle/wrapper"
          WRAPPER_JAR="$PROJECT/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "Downloading gradle-wrapper.jar…"
            curl -fsSL -o "$WRAPPER_JAR" \
              "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
            echo "Downloaded: $(ls -lh $WRAPPER_JAR)"
          fi
          chmod +x "$PROJECT/gradlew"

      # ─── 6. Gradle cache ─────────────────────────────────────────────────────
      - name: "💾 Cache Gradle packages"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 7. Build ────────────────────────────────────────────────────────────
      - name: "🏗️ Build Debug APK"
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          cd "$PROJECT"
          gradle assembleDebug --stacktrace --no-daemon
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      # ─── 8. APK info ─────────────────────────────────────────────────────────
      - name: "📊 APK info"
        id: apk
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          APK=$(find "$PROJECT/app/build/outputs/apk/debug" -name "*.apk" | head -1)
          echo "=== Build successful! ==="
          ls -lh "$APK"
          SIZE_MB=$(stat -c%s "$APK" | awk '{printf "%.2f", $1/1048576}')
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "size=${SIZE_MB} MB" >> "$GITHUB_OUTPUT"

      # ─── 9. Upload artifact ──────────────────────────────────────────────────
      - name: "📤 Upload Debug APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "AirKey-Debug-APK-${{ github.run_number }}"
          path: |
            app/build/outputs/apk/debug/*.apk
            wifi-qr-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ─── 10. GitHub Release (push to main/master only) ───────────────────────
      - name: "🚀 Create GitHub Pre-release"
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "debug-build-${{ github.run_number }}"
          name: "AirKey Debug Build ${{ github.run_number }}"
          body: |
            ## 🐛 AirKey Debug Build ${{ github.run_number }}

            **Branch:** `${{ github.ref_name }}`  
            **Commit:** `${{ github.sha }}`  
            **Date:** ${{ github.event.head_commit.timestamp }}

            > ⚠️ This is an **unsigned debug build** — for testing only.  
            > For production installs, use a [signed release build](../../releases/latest).

            ### Install
            1. Download `app-debug.apk` below
            2. Enable **Install unknown apps** and tap to install
            3. Signed with Android debug keystore — sideload only

            | Field | Value |
            |---|---|
            | Build # | `${{ github.run_number }}` |
            | Build type | Debug (unsigned) |
            | APK size | ${{ steps.apk.outputs.size }} |
            | Min Android | 8.0 (API 26) |
          files: |
            app/build/outputs/apk/debug/*.apk
            wifi-qr-app/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── 11. Build summary ────────────────────────────────────────────────────
      - name: "📋 Build Summary"
        if: always()
        run: |
          echo "### 🐛 AirKey Debug Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK size | ${{ steps.apk.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above ⬆️" >> $GITHUB_STEP_SUMMARY
