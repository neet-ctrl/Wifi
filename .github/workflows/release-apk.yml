# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  ACCU — Signed Release APK                                               ║
# ║  Fires on push to main/master, on any v* tag, or manually.              ║
# ║  Keystore is baked in as base64 — no secrets setup required.             ║
# ╚══════════════════════════════════════════════════════════════════════════╝
name: "📦 Release APK — ACCU"

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

jobs:
  release:
    name: "🔐 Build & Publish Signed Release APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "☕ Set up JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "🔧 Download Gradle Wrapper JAR"
        working-directory: android-control-center
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "Downloading gradle-wrapper.jar for Gradle 8.11.1…"
            curl -fsSL -o "$WRAPPER_JAR" \
              "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
              || curl -fsSL -o "$WRAPPER_JAR" \
                "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar"
            echo "Downloaded: $(ls -lh $WRAPPER_JAR)"
          else
            echo "gradle-wrapper.jar already present."
          fi

      - name: "🔑 Grant gradlew execute permission"
        working-directory: android-control-center
        run: chmod +x gradlew

      - name: "💾 Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            android-control-center/.gradle
          key: ${{ runner.os }}-gradle-accu-release-${{ hashFiles('android-control-center/**/*.gradle*', 'android-control-center/**/gradle-wrapper.properties', 'android-control-center/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-accu-

      - name: "🔏 Decode release keystore"
        working-directory: android-control-center
        run: |
          echo "" \
            | base64 -d > app/release.jks
          echo "Keystore written: $(ls -lh app/release.jks)"

      - name: "🏗️ Build signed release APK"
        working-directory: android-control-center
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.testOnly=false
        env:
          JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: "Sh@090609"
          KEY_ALIAS: my-key
          KEY_PASSWORD: "Sh@090609"

      - name: "📦 Locate APKs"
        id: apk
        run: |
          APK_FILES=$(find android-control-center/app/build/outputs/apk/release -name "*.apk" ! -name "*-unsigned*" | sort)
          echo "Found APKs:"
          echo "$APK_FILES" | xargs ls -lh
          PRIMARY=$(echo "$APK_FILES" | grep -i "universal" | head -1)
          [ -z "$PRIMARY" ] && PRIMARY=$(echo "$APK_FILES" | head -1)
          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"

      - name: "📊 APK size"
        id: apk_info
        run: |
          SIZE_MB=$(stat -c%s "${{ steps.apk.outputs.primary }}" | awk '{printf "%.2f", $1/1048576}')
          echo "size=${SIZE_MB} MB" >> "$GITHUB_OUTPUT"

      - name: "📝 Generate release notes"
        id: notes
        working-directory: android-control-center
        run: |
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "1.0.0")
          BODY="## ACCU v${VERSION} — Release Build ${{ github.run_number }}

          **Release Date:** ${DATE}

          ### What's included
          - Latest production build of Android Control Center Ultimate
          - All crash-system, audio center, shell, and system features
          - Signed with the official release keystore · R8 minified

          ### Package Details
          | Field | Value |
          |---|---|
          | Version | \`${VERSION}\` |
          | Build # | \`${{ github.run_number }}\` |
          | Build type | Release (signed) |
          | APK size | ${{ steps.apk_info.outputs.size }} |
          | Min Android | 10 (API 29) |
          | Commit | \`${{ github.sha }}\` |

          ### ABI variants attached
          | File | Architecture |
          |---|---|
          | \`*-arm64-v8a-release.apk\` | Most modern phones |
          | \`*-armeabi-v7a-release.apk\` | Older 32-bit ARM |
          | \`*-x86_64-release.apk\` | Emulators / Intel |
          | \`*-universal-release.apk\` | All architectures (largest) |

          ### Installation
          1. Download the APK for your device's architecture
          2. Enable **Install unknown apps** for your file manager
          3. Install and open ACCU"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: "📤 Upload APKs as workflow artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "ACCU-release-build${{ github.run_number }}"
          path: android-control-center/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-release
          name: "ACCU Release Build ${{ github.run_number }}"
          body: ${{ steps.notes.outputs.body }}
          files: android-control-center/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "📋 Build Summary"
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android-control-center/app/build.gradle.kts || echo "1.0.0")
          echo "## 📦 ACCU Release APK Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ${{ steps.apk_info.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Tag | v${{ github.run_number }}-release |" >> $GITHUB_STEP_SUMMARY
