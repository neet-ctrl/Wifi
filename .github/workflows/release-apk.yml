# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  AirKey — Signed Release APK                                             ║
# ║  Fires on push to main/master, on any v* tag, or manually.              ║
# ║  Keystore is baked in as base64 — no secrets setup required.             ║
# ╚══════════════════════════════════════════════════════════════════════════╝
name: "📦 AirKey — Signed Release APK"

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'
  KEYSTORE_PASSWORD: "Sh@090609"
  KEY_ALIAS: "my-key"
  KEY_PASSWORD: "Sh@090609"

jobs:
  release:
    name: "🔐 Build & Publish Signed Release APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────────────────
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 2. Detect project root ───────────────────────────────────────────────
      - name: "🔍 Detect Android project root"
        id: detect
        run: |
          if [ -f "settings.gradle" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_OUTPUT
            echo "Found project at: root"
          elif [ -f "wifi-qr-app/settings.gradle" ]; then
            echo "PROJECT_DIR=wifi-qr-app" >> $GITHUB_OUTPUT
            echo "Found project at: wifi-qr-app/"
          else
            echo "ERROR: Cannot find settings.gradle"
            find . -name "settings.gradle" -maxdepth 4
            exit 1
          fi

      # ─── 3. JDK 17 ───────────────────────────────────────────────────────────
      - name: "☕ Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # ─── 4. Android SDK ──────────────────────────────────────────────────────
      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v3

      # ─── 5. Gradle wrapper JAR ────────────────────────────────────────────────
      - name: "🔧 Download Gradle Wrapper JAR"
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          mkdir -p "$PROJECT/gradle/wrapper"
          WRAPPER_JAR="$PROJECT/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "Downloading gradle-wrapper.jar…"
            curl -fsSL -o "$WRAPPER_JAR" \
              "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
            echo "Downloaded: $(ls -lh $WRAPPER_JAR)"
          fi
          chmod +x "$PROJECT/gradlew"

      # ─── 6. Gradle cache ─────────────────────────────────────────────────────
      - name: "💾 Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 7. Decode keystore ───────────────────────────────────────────────────
      - name: "🔏 Decode release keystore"
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          echo "" \
            | base64 -d > "$PROJECT/app/release.jks"
          echo "Keystore written: $(ls -lh $PROJECT/app/release.jks)"

      # ─── 8. Build signed release APK ─────────────────────────────────────────
      - name: "🏗️ Build signed release APK"
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          cd "$PROJECT"
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
          KEYSTORE_PATH: "release.jks"
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      # ─── 9. Locate APKs ──────────────────────────────────────────────────────
      - name: "📦 Locate APKs"
        id: apk
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          APK_DIR="$PROJECT/app/build/outputs/apk/release"
          echo "=== APKs found ==="
          find "$APK_DIR" -name "*.apk" | xargs ls -lh
          PRIMARY=$(find "$APK_DIR" -name "*release*.apk" ! -name "*unsigned*" | head -1)
          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"
          SIZE_MB=$(stat -c%s "$PRIMARY" | awk '{printf "%.2f", $1/1048576}')
          echo "size=${SIZE_MB} MB" >> "$GITHUB_OUTPUT"

      # ─── 10. Generate release notes ───────────────────────────────────────────
      - name: "📝 Generate release notes"
        id: notes
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*[=:]\s*["'"'"']\K[^"'"'"']+' "$PROJECT/app/build.gradle" 2>/dev/null | head -1 || echo "1.0.0")
          REF="${{ github.ref_name }}"

          BODY="## 🔑 AirKey v${VERSION} — Release Build ${{ github.run_number }}

          **Release Date:** ${DATE}  
          **Ref:** \`${REF}\`  
          **Commit:** \`${{ github.sha }}\`

          ### What's included
          - Signed release APK — ready to install on any Android device
          - All WiFi QR scan, generate & vault features
          - R8 minified & shrunk for smallest footprint
          - Signed with the official release keystore

          ### Package Details
          | Field | Value |
          |---|---|
          | Version | \`${VERSION}\` |
          | Build # | \`${{ github.run_number }}\` |
          | Build type | Release (signed) |
          | APK size | ${{ steps.apk.outputs.size }} |
          | Min Android | 8.0 (API 26) |

          ### Installation
          1. Download \`app-release.apk\` below
          2. Enable **Install unknown apps** for your file manager / browser
          3. Open the APK and tap **Install**
          4. Launch **AirKey** — scan, generate & manage WiFi QR codes instantly"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ─── 11. Upload artifact ─────────────────────────────────────────────────
      - name: "📤 Upload release APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "AirKey-Release-Build${{ github.run_number }}"
          path: |
            app/build/outputs/apk/release/*.apk
            wifi-qr-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      # ─── 12. Create GitHub Release ────────────────────────────────────────────
      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-release', github.run_number) }}
          name: "AirKey Release Build ${{ github.run_number }}"
          body: ${{ steps.notes.outputs.body }}
          files: |
            app/build/outputs/apk/release/*.apk
            wifi-qr-app/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── 13. Build summary ────────────────────────────────────────────────────
      - name: "📋 Build Summary"
        if: always()
        run: |
          PROJECT="${{ steps.detect.outputs.PROJECT_DIR }}"
          VERSION=$(grep -oP 'versionName\s*[=:]\s*["'"'"']\K[^"'"'"']+' "$PROJECT/app/build.gradle" 2>/dev/null | head -1 || echo "1.0.0")
          echo "## 📦 AirKey Signed Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ${{ steps.apk.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ✅ Yes (release keystore) |" >> $GITHUB_STEP_SUMMARY
