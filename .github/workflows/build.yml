# ╔══════════════════════════════════════════════════════════════╗
# ║  Android Control Center Ultimate — Workspace Root Trigger   ║
# ║  Push the ENTIRE workspace → workflow fires automatically.  ║
# ║  Builds DEBUG APK and publishes a GitHub pre-release.        ║
# ╚══════════════════════════════════════════════════════════════╝
name: "🔧 Build Debug APK (Workspace Root)"

on:
  push:
    branches:
      - '**'
    paths:
      - 'android-control-center/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'android-control-center/**'
  workflow_dispatch:
    inputs:
      run_lint:
        description: 'Run lint check'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build-debug:
    name: "🏗️ Build Debug APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "☕ Set up JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "🔍 List installed SDK packages"
        run: |
          echo "=== ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT ==="
          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed 2>/dev/null || true
          echo "=== Platforms on disk ==="
          ls "$ANDROID_SDK_ROOT/platforms/" 2>/dev/null || echo "No platforms directory found"
          echo "=== Build-tools on disk ==="
          ls "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null || echo "No build-tools directory found"

      - name: "🔧 Download Gradle Wrapper JAR"
        working-directory: android-control-center
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "Downloading gradle-wrapper.jar for Gradle 8.11.1…"
            curl -fsSL -o "$WRAPPER_JAR" \
              "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
              || curl -fsSL -o "$WRAPPER_JAR" \
                "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar"
            echo "Downloaded: $(ls -lh $WRAPPER_JAR)"
          else
            echo "gradle-wrapper.jar already present."
          fi

      - name: "🔑 Grant gradlew permission"
        working-directory: android-control-center
        run: chmod +x gradlew

      - name: "🛡️ Safety — Duplicate LazyList Key Scanner"
        run: |
          chmod +x .github/scripts/check_lazy_keys.sh
          bash .github/scripts/check_lazy_keys.sh

      - name: "💾 Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            android-control-center/.gradle
          key: ${{ runner.os }}-gradle-accu-${{ hashFiles('android-control-center/**/*.gradle*', 'android-control-center/**/gradle-wrapper.properties', 'android-control-center/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-accu-

      - name: "🔨 Build DEBUG APK"
        working-directory: android-control-center
        run: |
          echo "Building DEBUG APK"
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.testOnly=false
        env:
          JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: "✅ Verify APK exists"
        working-directory: android-control-center
        run: |
          echo "=== Built APK Files ==="
          ls -lh app/build/outputs/apk/debug/*.apk
          echo ""
          echo "Build #${{ github.run_number }} · Branch: ${{ github.ref_name }} · Commit: ${{ github.sha }}"

      - name: "📦 Locate APKs"
        id: apk
        run: |
          APK_FILES=$(find android-control-center/app/build/outputs/apk/debug -name "*.apk" | sort)
          echo "Found APKs:"
          echo "$APK_FILES" | xargs ls -lh
          PRIMARY=$(echo "$APK_FILES" | grep -i "universal" | head -1)
          [ -z "$PRIMARY" ] && PRIMARY=$(echo "$APK_FILES" | head -1)
          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"

      - name: "📊 APK size"
        id: apk_info
        run: |
          SIZE_MB=$(stat -c%s "${{ steps.apk.outputs.primary }}" | awk '{printf "%.2f", $1/1048576}')
          echo "size=${SIZE_MB} MB" >> "$GITHUB_OUTPUT"

      - name: "📝 Generate release notes"
        id: notes
        working-directory: android-control-center
        run: |
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "1.0.0")
          BODY="## ACCU v${VERSION}-debug — Build ${{ github.run_number }}

          **Date:** ${DATE}
          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`

          > ⚠️ **Debug build** — not optimised, contains debug symbols, applicationId suffix \`.debug\`. For testing only.

          ### Package Details
          | Field | Value |
          |---|---|
          | Version | \`${VERSION}-debug\` |
          | Build # | \`${{ github.run_number }}\` |
          | Build type | Debug (unsigned / debug key) |
          | APK size | ${{ steps.apk_info.outputs.size }} |
          | Min Android | 10 (API 29) |
          | Triggered by | ${{ github.actor }} |

          ### ABI variants attached
          | File | Architecture |
          |---|---|
          | \`*-arm64-v8a-debug.apk\` | Most modern phones |
          | \`*-armeabi-v7a-debug.apk\` | Older 32-bit ARM |
          | \`*-x86_64-debug.apk\` | Emulators / Intel |
          | \`*-universal-debug.apk\` | All architectures (largest) |

          ### Installation
          1. Download the APK for your device architecture
          2. Enable **Install unknown apps** for your file manager
          3. Install alongside the release build (different app ID: \`com.accu.controlcenter.debug\`)"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: "📤 Upload Debug APK as workflow artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "ACCU-debug-build${{ github.run_number }}"
          path: android-control-center/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: "📊 Upload Build Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "build-report-${{ github.run_number }}"
          path: android-control-center/app/build/reports/
          retention-days: 7

      - name: "🚀 Create GitHub Pre-Release"
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-debug
          name: "ACCU Debug Build ${{ github.run_number }}"
          body: ${{ steps.notes.outputs.body }}
          files: android-control-center/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "📋 Build Summary"
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android-control-center/app/build.gradle.kts || echo "1.0.0")
          echo "## ✅ ACCU Debug APK Built & Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}-debug\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ${{ steps.apk_info.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Tag | v${{ github.run_number }}-debug |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: "🔍 Lint Check (non-blocking)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.inputs.run_lint == 'true' || github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: "🔧 Download Gradle Wrapper JAR"
        working-directory: android-control-center
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            curl -fsSL -o "$WRAPPER_JAR" \
              "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
              || curl -fsSL -o "$WRAPPER_JAR" \
                "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar"
          fi
      - name: "🔍 Run Lint (non-blocking)"
        working-directory: android-control-center
        run: |
          chmod +x gradlew
          ./gradlew lintDebug --no-daemon
        continue-on-error: true
        env:
          JAVA_OPTS: "-Xmx4g"
      - name: "📤 Upload Lint Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "lint-report-${{ github.run_number }}"
          path: android-control-center/app/build/reports/lint-results-debug.html
          retention-days: 7
