# ╔══════════════════════════════════════════════════════════╗
# ║  Android Control Center Ultimate — Debug Build Only      ║
# ║  NO SIGNED APK. NO RELEASE BUILD. DEBUG ONLY.            ║
# ╚══════════════════════════════════════════════════════════╝
name: "🔧 Build Debug APK"

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      run_lint:
        description: 'Run lint check'
        required: false
        default: 'false'
        type: boolean

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # ── Job: Build Debug APK Only ──────────────────────────────
  build-debug:
    name: "🏗️ Build Debug APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "☕ Set up JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "🔑 Grant execute permission for gradlew"
        run: chmod +x gradlew

      - name: "💾 Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: "🔨 Build DEBUG APK (No Signed/Release build)"
        run: |
          echo "Building DEBUG only — no signed APK, no release APK"
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Pandroid.injected.testOnly=false
        env:
          JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: "✅ Verify APK exists"
        run: |
          echo "=== Built APK Files ==="
          ls -lh app/build/outputs/apk/debug/*.apk
          echo ""
          echo "=== APK Info ==="
          echo "Build #${{ github.run_number }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: "📤 Upload Debug APK as Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "ACCU-debug-build${{ github.run_number }}"
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: "📊 Upload Build Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "build-report-${{ github.run_number }}"
          path: |
            app/build/reports/
          retention-days: 7

  # ── Job: Lint (optional, never blocks APK download) ────────
  lint:
    name: "🔍 Lint Check"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: []
    # Lint runs in parallel with build, never blocks it
    if: ${{ github.event.inputs.run_lint == 'true' || github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - name: "🔍 Run Lint (non-blocking)"
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: "📤 Upload Lint Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "lint-report-${{ github.run_number }}"
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
